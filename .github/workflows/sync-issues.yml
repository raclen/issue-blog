name: Sync Issues

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, closed, deleted]

permissions:
  contents: write
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync issues to Markdown
        run: npm run sync:issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_REPO: ${{ github.repository }}
          ISSUE_LABEL: blog

      - name: Commit synced posts
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: sync issues to blog [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: "src/content/blog/*.md src/content/blog/.sync-meta.json"
